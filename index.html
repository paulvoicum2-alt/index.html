<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pockit Style FiveM Bank</title>
    <style>
        :root {
            --yellow-bg: linear-gradient(180deg, #ffde17 0%, #fcc200 100%);
            --body-bg: #f5f6fa;
            --text-dark: #000000;
            --text-secondary: #5a5a62;
            --card-white: #ffffff;
            --accent-blue: #0084ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Viewport Wrapper */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            background-color: var(--body-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Yellow Header Section */
        .header-section {
            background: var(--yellow-bg);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            padding: 40px 20px 30px 20px;
            text-align: center;
            color: var(--text-dark);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .card-numbers {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .main-balance {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .sync-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 20px;
        }

        .top-up-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Main Content Container */
        .content {
            padding: 20px;
            flex-grow: 1;
            padding-bottom: 90px; /* Space for navbar */
        }

        /* Offer Banners */
        .banner {
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .banner-cash {
            background: linear-gradient(135deg, #ffffff 0%, #e6f4ff 100%);
        }

        .banner-draw {
            background: linear-gradient(135deg, #ffe3d1 0%, #f3d1ff 100%);
        }

        .banner-text h3 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 10px;
            max-width: 200px;
            line-height: 1.3;
        }

        .banner-btn {
            background: linear-gradient(90deg, #ff9000 0%, #ff5e00 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Segmented Control (Recent / Rewards) */
        .segmented-control {
            background: #e4e4ee;
            padding: 4px;
            border-radius: 15px;
            display: flex;
            margin: 20px 0;
        }

        .segment-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .segment-btn.active {
            background: var(--card-white);
            color: var(--accent-blue);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        /* Transactions list */
        .date-header {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .date-header span {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .tx-row {
            background: var(--card-white);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            background: #fff9d6;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .tx-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .tx-status {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tx-right {
            text-align: right;
        }

        .tx-cost {
            font-weight: 800;
            font-size: 1.05rem;
        }

        /* Bottom Nav Bar */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75px;
            background: var(--card-white);
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--accent-blue);
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- Header copied directly from screenshot styles -->
        <div class="header-section">
            <div class="card-title">Mariana's Primary Card</div>
            <div class="card-numbers">23-32-72 | 09278773</div>
            <div class="main-balance">£4.77</div>
            <div class="sync-time">🔄 2 minutes ago</div>
            <button class="top-up-btn">⚡ TOP UP</button>
        </div>

        <div class="content">
            <!-- Cash Advance Banner -->
            <div class="banner banner-cash">
                <div class="banner-text">
                    <h3>You're eligible to get a £50 cash advance!</h3>
                    <button class="banner-btn">Get started →</button>
                </div>
                <div style="font-size: 3rem;">💸</div>
            </div>

            <!-- Weekly Draw Banner -->
            <div class="banner banner-draw">
                <div class="banner-text">
                    <h3>Weekly Prizedraw</h3>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px;">Top up £10+ before Friday at 3pm for a chance to win!</p>
                </div>
                <div style="font-size: 3rem;">🎁</div>
            </div>

            <!-- Segmented Filter -->
            <div class="segmented-control">
                <button class="segment-btn active">Recent</button>
                <button class="segment-btn">Rewards</button>
            </div>

            <!-- Transaction List -->
            <div class="date-header">
                <span>11 May</span>
                <span>-£1.99</span>
            </div>

            <div class="tx-row">
                <div class="tx-left">
                    <div class="tx-icon">🏢</div>
                    <div>
                        <div class="tx-name">Pockit Standard</div>
                        <div class="tx-status">Paid</div>
                    </div>
                </div>
                <div class="tx-right">
                    <div class="tx-cost">-£1.99</div>
                </div>
            </div>
        </div>

        <!-- Sticky Bottom Navigation Bar -->
        <div class="bottom-nav">
            <div class="nav-item active">
                <div class="nav-icon">⚡</div>
                <div>Activity</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">👤</div>
                <div>Account</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">⇆</div>
                <div>Transfers</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">💳</div>
                <div>Credit</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">🧭</div>
                <div>Explore</div>
            </div>
        </div>

    </div>

</body>
</html>
