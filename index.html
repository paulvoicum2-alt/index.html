<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pockit Style FiveM Bank</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --yellow-main: #ffde17;
            --yellow-bg: linear-gradient(180deg, #ffde17 0%, #fcc200 100%);
            --body-bg: #f5f6fa;
            --text-dark: #000000;
            --text-secondary: #5a5a62;
            --card-white: #ffffff;
            --accent-blue: #0084ff;
            --tx-green: #00bfa5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overscroll-behavior-y: contain; /* STOPS THE APK SWIPE-TO-REFRESH GLITCH */
        }

        /* Mobile Viewport Wrapper */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            background-color: var(--body-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Screen Wrapper Setup */
        .app-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow-y: auto;
            padding-bottom: 85px; /* Leave space for navigation */
            overscroll-behavior-y: contain;
        }

        .app-screen.active {
            display: flex;
        }

        /* SCREEN 1: ACTIVITY HEADER */
        .header-section {
            background: var(--yellow-bg);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            padding: 40px 20px 30px 20px;
            text-align: center;
            color: var(--text-dark);
        }

        .card-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .card-numbers {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .main-balance {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .sync-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .top-up-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        /* Content Global Sizing */
        .content {
            padding: 20px;
        }

        /* Offer Banners */
        .banner {
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }
